<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu de Favoritos</title>
  <style>
    :root {
      --bg: #070b16;
      --bg-soft: #111827;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

   

    .app {
      width: min(1480px, 100%);
      margin: 0 auto;
    }

    .hero {
      width: 100%;
      margin-bottom: 24px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .form-card {
      width: 100%;
      padding: 24px;
    }

    .form-card h2 {
      margin: 0 0 18px;
      font-size: 18px;
    }

    .top-bar {
      display: grid;
      gap: 12px;
    }

    .field {
      position: relative;
    }

    .field input {
      width: 100%;
      padding: 15px 16px;
      color: var(--text);
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 16px;
      outline: none;
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .field input::placeholder {
      color: #64748b;
    }

    .field input:focus {
      border-color: rgba(34, 197, 94, 0.72);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
      transform: translateY(-1px);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    button,
    .import-label {
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      text-align: center;
      user-select: none;
    }

    button:hover,
    .import-label:hover {
      transform: translateY(-2px);
    }

    .primary-btn {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.28);
    }

    .secondary-btn,
    .import-label {
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .secondary-btn:hover,
    .import-label:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      margin-bottom: 18px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .counter {
      color: var(--muted);
      font-size: 14px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 16px;
      padding: 24px;
      min-height: 300px;
    }

    .menu-item {
      position: relative;
      min-height: 128px;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
       
     
      
      cursor: pointer;
      user-select: none;
      overflow: hidden;
       
	    background: #343541;
  border: 1px solid #565869;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  transition: 0.2s;
    }

    .menu-item::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(34, 197, 94, 0.2), transparent 55%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .menu-item:hover {
      transform: translateY(-5px); 
      border-color: rgba(34, 197, 94, 0.38);
	  
	   background: #40414f;
  transform: translateY(-2px);
    }

    .menu-item:hover::before {
      opacity: 1;
    }

    .menu-item img {
      position: relative;
      width: 46px;
      height: 46px;
      padding: 8px;
      border-radius: 16px;
      
      object-fit: contain;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.24);
    }

    .menu-item span {
      position: relative;
      display: block;
      width: 100%;
       font-size: 12px;
  color: #c5c5d2;
       
      font-weight: 750;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
	
 

    .delete-btn {
      position: absolute;
      z-index: 2;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.18);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.34);
      font-size: 18px;
      line-height: 1;
      opacity: 0;
      transform: scale(0.9);
	  background: #ef4444;
    }

    .menu-item:hover .delete-btn {
      opacity: 1;
      transform: scale(1);
	  
    }

    .delete-btn:hover {
      background: var(--danger-dark);
      background: #dc2626;
    }

    .empty-state {
      grid-column: 1 / -1;
      min-height: 240px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(148, 163, 184, 0.32);
      border-radius: 24px;
      padding: 28px;
    }

    .empty-state strong {
      display: block;
      color: var(--text);
      margin-bottom: 8px;
      font-size: 18px;
    }

    @media (max-width: 820px) {
      body {
        padding: 18px 12px;
      }

      .form-card,
      .toolbar,
      .menu {
        padding: 20px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
	
	
	
	
	
	
	
	
	
	
	
	
	
	body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #343541;
  color: #ececf1;

  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
  box-sizing: border-box;
}














.panel {
  width: 100%;
  
}

.form-card,
.menu {
  width: 100%;
  background: #444654;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* inputs */
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #565869;
  background: #343541;
  color: #ececf1;
}

input::placeholder {
  color: #a1a1aa;
}

/* botões */
button,
.custom-btn {
  background: #10a37f;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}

button:hover,
.custom-btn:hover {
  background: #19c37d;
}

 
 

/* texto */
.menu-item span {
  font-size: 12px;
  color: #c5c5d2;
}

  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <div class="form-card panel">
        <h2>Adicionar favorito</h2>
        <div class="top-bar">
          <div class="field">
            <input type="text" id="linkInput" placeholder="https://exemplo.com">
          </div>
          <div class="field">
            <input type="text" id="nameInput" placeholder="Nome do site">
          </div>
          <div class="actions">
            <button class="primary-btn" onclick="adicionarFavorito()">Adicionar favorito</button>
            <button class="secondary-btn" onclick="exportarFavoritos()">Exportar</button>
            <label class="import-label">
              Importar
              <input type="file" accept=".json" onchange="importarFavoritos(event)" style="display: none;">
            </label>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div>
          <h2>Meus favoritos</h2>
          <span class="counter" id="counter">0 favoritos</span>
        </div>
      </div>
      <div class="menu" id="menu"></div>
    </section>
  </main>

  <script>
    const menu = document.getElementById('menu');
    const counter = document.getElementById('counter');

    function salvarFavoritos(lista) {
      localStorage.setItem('favoritos', JSON.stringify(lista));
    }

    function carregarFavoritos() {
      const dados = localStorage.getItem('favoritos');
      return dados ? JSON.parse(dados) : [];
    }

    function normalizarLink(link) {
      if (!/^https?:\/\//i.test(link)) {
        return `https://${link}`;
      }
      return link;
    }

    function atualizarContador(total) {
      counter.textContent = total === 1 ? '1 favorito' : `${total} favoritos`;
    }

    function renderizarFavoritos() {
      menu.innerHTML = '';
      const favoritos = carregarFavoritos();
      atualizarContador(favoritos.length);

      if (!favoritos.length) {
        menu.innerHTML = `
          <div class="empty-state">
            <div>
              <strong>Nenhum favorito ainda</strong>
              Adicione seu primeiro link usando o formulário acima.
            </div>
          </div>
        `;
        return;
      }

      favoritos.forEach((fav, index) => {
        let dominio = '';
        try {
          dominio = new URL(fav.link).hostname;
        } catch {
          dominio = fav.link;
        }

        const favicon = `https://www.google.com/s2/favicons?domain=${dominio}&sz=64`;

        const item = document.createElement('div');
        item.className = 'menu-item';
        item.title = fav.nome;
        item.innerHTML = `
          <button class="delete-btn" onclick="deletarFavorito(event, ${index})" aria-label="Excluir favorito">×</button>
          <img src="${favicon}" alt="Ícone de ${fav.nome}">
          <span>${fav.nome}</span>
        `;
        item.onclick = () => window.open(fav.link, '_self');
        menu.appendChild(item);
      });
    }

    function adicionarFavorito() {
      const linkCampo = document.getElementById('linkInput');
      const nomeCampo = document.getElementById('nameInput');
      const link = normalizarLink(linkCampo.value.trim());
      const nome = nomeCampo.value.trim();

      if (!link || !nome) {
        alert('Preencha os dois campos.');
        return;
      }

      try {
        new URL(link);
      } catch {
        alert('Informe um link válido.');
        return;
      }

      const favoritos = carregarFavoritos();
      favoritos.push({ link, nome });
      salvarFavoritos(favoritos);

      linkCampo.value = '';
      nomeCampo.value = '';
      renderizarFavoritos();
    }

    function deletarFavorito(event, index) {
      event.stopPropagation();
      const favoritos = carregarFavoritos();
      favoritos.splice(index, 1);
      salvarFavoritos(favoritos);
      renderizarFavoritos();
    }

    function exportarFavoritos() {
      const favoritos = carregarFavoritos();
      const blob = new Blob([JSON.stringify(favoritos, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'favoritos.json';
      a.click();

      URL.revokeObjectURL(url);
    }

    function importarFavoritos(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const dados = JSON.parse(e.target.result);
          if (Array.isArray(dados)) {
            salvarFavoritos(dados);
            renderizarFavoritos();
          } else {
            alert('Arquivo inválido!');
          }
        } catch (e) {
          alert('Erro ao importar favoritos!');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    renderizarFavoritos();
  </script>
</body>

</html>
